<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUGU - O micr blog de apen quat cara</title>
    <link rel="icon" type="image/webp" href="/gugu.webp">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: #2a2a3d;
            --accent: #5555ff;
            --accent2: #44ff88;
            --text: #e0e0e0;
            --muted: #555577;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(85,85,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(85,85,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── AUTH SCREEN ── */
        #telaAuth {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .auth-logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .auth-logo span {
            color: var(--accent2);
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .auth-tab {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0.6rem 1.2rem;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .auth-tab.active {
            color: var(--text);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent);
        }

        .auth-form { display: none; flex-direction: column; gap: 1rem; }
        .auth-form.active { display: flex; animation: fadeUp 0.3s ease; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .field-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"],
        textarea {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(85,85,255,0.1);
        }

        textarea { resize: none; height: 80px; }

        .btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 20px;
            border-radius: 6px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(85,85,255,0.3);
        }

        .btn:active { transform: scale(0.98); }

        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
            font-size: 11px;
            padding: 6px 12px;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 0 12px rgba(255,68,68,0.3);
        }

        .btn-ghost {
            border-color: var(--border);
            color: var(--muted);
            font-size: 11px;
            padding: 6px 12px;
        }

        .btn-ghost:hover {
            background: var(--surface2);
            color: var(--text);
            box-shadow: none;
        }

        .error-msg {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--danger);
            padding: 8px 12px;
            border: 1px solid rgba(255,68,68,0.2);
            border-radius: 4px;
            background: rgba(255,68,68,0.05);
            display: none;
        }

        /* ── FEED SCREEN ── */
        #telaFeed {
            display: none;
            position: relative;
            z-index: 1;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-logo {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .topbar-logo span { color: var(--accent2); }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-user {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .feed-layout {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* compose box */
        .compose {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
        }

        .compose-header {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .compose-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.75rem;
        }

        .char-counter {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            transition: color 0.2s;
        }

        .char-counter.over { color: var(--danger); }

        /* divider */
        .feed-divider {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .feed-divider::before,
        .feed-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* posts */
        #postsList { display: flex; flex-direction: column; gap: 0.75rem; }

        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            animation: fadeUp 0.3s ease;
            transition: border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(85,85,255,0.4), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
        }

        .post-card:hover { border-color: #3a3a5a; }
        .post-card:hover::before { transform: translateX(100%); }

        .post-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .post-author {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .post-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: var(--muted);
        }

        .post-content {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text);
            word-break: break-word;
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 2px;
        }

        .loading {
            text-align: center;
            padding: 2rem 0;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 3px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* edit mode */
        .post-edit-area {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            padding: 10px 14px;
            outline: none;
            resize: none;
            height: 80px;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<!-- ── TELA DE AUTH ── -->
<div id="telaAuth">
    <div class="auth-box">
        <div class="auth-logo">gugu<span>//</span>blog</div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" onclick="switchTab('register')">Cadastro</button>
        </div>

        <!-- login -->
        <div class="auth-form active" id="formLogin">
            <div>
                <div class="field-label">Email</div>
                <input type="email" id="loginEmail" placeholder="seu@email.com" />
            </div>
            <div>
                <div class="field-label">Senha</div>
                <input type="password" id="loginPassword" placeholder="••••••••" />
            </div>
            <div class="error-msg" id="loginError"></div>
            <button class="btn" onclick="login()">Entrar</button>
        </div>

        <!-- cadastro -->
        <div class="auth-form" id="formRegister">
            <div>
                <div class="field-label">Email</div>
                <input type="email" id="registerEmail" placeholder="seu@email.com" />
            </div>
            <div>
                <div class="field-label">Senha</div>
                <input type="password" id="registerPassword" placeholder="••••••••" />
            </div>
            <div class="error-msg" id="registerError"></div>
            <button class="btn" onclick="register()">Criar conta</button>
        </div>
    </div>
</div>

<!-- ── TELA DE FEED ── -->
<div id="telaFeed">
    <div class="topbar">
        <div class="topbar-logo">micro<span>//</span>blog</div>
        <div class="topbar-right">
            <span class="topbar-user" id="topbarUser"></span>
            <button class="btn-ghost btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="feed-layout">
        <!-- compose -->
        <div class="compose">
            <div class="compose-header">// novo post</div>
            <textarea id="postContent" placeholder="O que você está pensando? (máx. 4 caracteres)" maxlength="4" oninput="updateCounter()"></textarea>
            <div class="compose-footer">
                <span class="char-counter" id="charCounter">0 / 4</span>
                <button class="btn" onclick="criarPost()">Publicar</button>
            </div>
        </div>

        <div class="feed-divider">feed</div>

        <div id="postsList">
            <div class="loading">carregando...</div>
        </div>
    </div>
</div>

<script>
    const API = 'gugu-production.up.railway.app'

    // ── INIT ──
    if (localStorage.getItem('token')) {
        mostrarFeed()
    } else {
        mostrarAuth()
    }

    // ── NAVEGAÇÃO ──
    function mostrarFeed() {
        document.getElementById('telaAuth').style.display = 'none'
        document.getElementById('telaFeed').style.display = 'block'
        const payload = parseToken(localStorage.getItem('token'))
        if (payload) document.getElementById('topbarUser').textContent = payload.email
        carregarPosts()
    }

    function mostrarAuth() {
        document.getElementById('telaAuth').style.display = 'flex'
        document.getElementById('telaFeed').style.display = 'none'
    }

    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0) === (tab === 'login'))
        })
        document.getElementById('formLogin').classList.toggle('active', tab === 'login')
        document.getElementById('formRegister').classList.toggle('active', tab === 'register')
    }

    function parseToken(token) {
        try {
            return JSON.parse(atob(token.split('.')[1]))
        } catch { return null }
    }

    // ── AUTH ──
    async function login() {
        const email = document.getElementById('loginEmail').value.trim()
        const password = document.getElementById('loginPassword').value
        const errorEl = document.getElementById('loginError')
        errorEl.style.display = 'none'

        const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })

        const data = await res.json()

        if (!res.ok) {
            errorEl.textContent = data.erro
            errorEl.style.display = 'block'
            return
        }

        localStorage.setItem('token', data.token)
        mostrarFeed()
    }

    async function register() {
        const email = document.getElementById('registerEmail').value.trim()
        const password = document.getElementById('registerPassword').value
        const errorEl = document.getElementById('registerError')
        errorEl.style.display = 'none'

        const res = await fetch(`${API}/auth/registrar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })

        const data = await res.json()

        if (!res.ok) {
            errorEl.textContent = data.erro
            errorEl.style.display = 'block'
            return
        }

        switchTab('login')
        document.getElementById('loginEmail').value = email
    }

    function logout() {
        localStorage.removeItem('token')
        mostrarAuth()
    }

    // ── POSTS ──
    async function carregarPosts() {
        const res = await fetch(`${API}/posts`)
        const posts = await res.json()
        renderPosts(posts)
    }

    function renderPosts(posts) {
        const list = document.getElementById('postsList')
        const currentUser = parseToken(localStorage.getItem('token'))

        if (posts.length === 0) {
            list.innerHTML = '<div class="empty-state">// nenhum post ainda</div>'
            return
        }

        list.innerHTML = posts.map(post => {
            const isOwner = currentUser && currentUser.id === post.user_id
            const date = new Date(post.created_at).toLocaleDateString('pt-br', {
                day: '2-digit', month: '2-digit', year: '2-digit',
                hour: '2-digit', minute: '2-digit'
            })

            return `
                <div class="post-card" id="post-${post.id}">
                    <div class="post-meta">
                        <span class="post-author">${post.email}</span>
                        <span class="post-date">${date}</span>
                    </div>
                    <div class="post-content" id="content-${post.id}">${post.content}</div>
                    ${isOwner ? `
                        <div class="post-actions">
                            <button class="btn btn-ghost" onclick="editarPost(${post.id}, '${post.content}')">editar</button>
                            <button class="btn btn-danger" onclick="deletarPost(${post.id})">deletar</button>
                        </div>
                    ` : ''}
                </div>
            `
        }).join('')
    }

    async function criarPost() {
        const content = document.getElementById('postContent').value.trim()
        if (!content) return

        const res = await fetch(`${API}/posts`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({ title: '-', content })
        })

        if (res.ok) {
            document.getElementById('postContent').value = ''
            updateCounter()
            carregarPosts()
        }
    }

    async function deletarPost(id) {
        const res = await fetch(`${API}/posts/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        })

        if (res.ok) carregarPosts()
    }

    function editarPost(id, conteudoAtual) {
        const contentEl = document.getElementById(`content-${id}`)
        const card = document.getElementById(`post-${id}`)

        contentEl.innerHTML = `
            <textarea class="post-edit-area" id="edit-${id}" maxlength="4">${conteudoAtual}</textarea>
            <div style="display:flex; gap:0.5rem;">
                <button class="btn" style="font-size:11px;padding:6px 12px;" onclick="salvarEdicao(${id})">salvar</button>
                <button class="btn btn-ghost" onclick="carregarPosts()">cancelar</button>
            </div>
        `
    }

    async function salvarEdicao(id) {
        const content = document.getElementById(`edit-${id}`).value.trim()
        if (!content) return

        const res = await fetch(`${API}/posts/${id}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({ title: '-', content })
        })

        if (res.ok) carregarPosts()
    }

    // ── UI ──
    function updateCounter() {
        const len = document.getElementById('postContent').value.length
        const el = document.getElementById('charCounter')
        el.textContent = `${len} / 4`
        el.classList.toggle('over', len > 4)
    }
</script>
</body>
</html>
